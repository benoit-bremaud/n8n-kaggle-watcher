services:
  n8n:
    image: n8nio/n8n:2.14.2
    restart: unless-stopped
    network_mode: host
    labels:
      - autoheal=true
    environment:
      - GENERIC_TIMEZONE=Europe/Paris
      - TZ=Europe/Paris
      - N8N_RESTRICT_FILE_ACCESS_TO=/data
      - NODE_FUNCTION_ALLOW_BUILTIN=fs
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - n8n_data:/home/node/.n8n
      - ../rules:/data/rules:ro
      - ../state:/data/state
      - ./resolv.conf:/etc/resolv.conf:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          wget -q --spider --timeout=3 http://localhost:5678/healthz &&
          wget -q --spider --timeout=3 https://1.1.1.1/
      interval: 60s
      timeout: 10s
      start_period: 60s
      retries: 3

  autoheal:
    image: willfarrell/autoheal:1.2.0
    restart: unless-stopped
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    # Match the n8n service so the tunnel target stays a simple
    # localhost:5678 and ngrok's local inspector API on port 4040 is
    # reachable from the host (used by the future webhook-updater
    # sidecar in #31).
    network_mode: host
    command: http --log=stdout 5678
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}

volumes:
  n8n_data:
