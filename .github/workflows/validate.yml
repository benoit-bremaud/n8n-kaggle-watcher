name: Validate & Lint

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    name: JSON Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jsonschema
        run: pip install jsonschema

      - name: Validate actions.json against schema
        run: |
          python3 -c "
          import json; from jsonschema import validate;
          schema = json.load(open('rules/actions.schema.json'));
          data = json.load(open('rules/actions.json'));
          validate(instance=data, schema=schema);
          print('actions.json is valid')
          "

      - name: Validate all workflow JSON syntax
        run: |
          for wf in workflows/*.json; do
            python3 -c "import json; json.load(open('$wf')); print('$wf is valid')"
          done

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: YAML lint
        run: |
          pip install yamllint
          yamllint -d relaxed docker/docker-compose.yml

      - name: Shell lint
        run: shellcheck scripts/*.sh

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "*.md"
          config: ".markdownlint.json"

  secrets:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect secrets with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
