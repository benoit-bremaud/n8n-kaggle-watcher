name: Validate JSON

on:
  pull_request:
    branches: [main]
    paths:
      - "rules/**"
      - "workflows/**"

jobs:
  validate:
    name: JSON Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jsonschema
        run: pip install jsonschema

      - name: Validate actions.json against schema
        run: |
          python3 -c "
          import json; from jsonschema import validate;
          schema = json.load(open('rules/actions.schema.json'));
          data = json.load(open('rules/actions.json'));
          validate(instance=data, schema=schema);
          print('actions.json is valid')
          "

      - name: Validate n8n workflow JSON syntax
        run: python3 -c "import json; json.load(open('workflows/kaggle-email-watcher.json')); print('workflow JSON is valid')"
